name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.12', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack + pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: Build
        # Build SDK first so packages/react typecheck can resolve
        # `@usetheo/sdk` types from `packages/sdk/dist/index.d.ts`.
        # Mirrors the `pnpm validate` script order in package.json.
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Publint
        run: pnpm validate:publint

      - name: ATTW (types resolve)
        run: pnpm validate:attw

      - name: Quality (dead code, cycles, LoC, duplication)
        run: pnpm quality
